<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmol Gupta | Certifications</title>
  
  <link rel="icon" type="image/png" href="Image/photo.png">
  <meta name="theme-color" content="#0f172a">
  
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --border: #1f2937;
      --gold: #fbbf24; /* Golden yellow for the titles */
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 40px 0;
    }

    /* --- BACK BUTTON STYLING --- */
    .back-btn {
      display: inline-block;
      margin-bottom: 25px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 20px;
      transition: color 0.3s ease;
    }

    .back-btn:hover {
      color: white;
    }

    .page-title {
      font-size: 2.2rem;
      margin-bottom: 30px;
      color: #ffffff;
      font-weight: 700;
    }

    .section-heading {
      color: white;
      margin: 40px 0 20px;
      font-size: 1.8rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }

    /* --- 3-COLUMN GRID LAYOUT (Used for both grids now) --- */
    .grid, .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
    }

    /* --- FEATURED CARD STYLING --- */
    .cert-card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .cert-card:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
    }

    .cert-card h3 {
      color: var(--gold);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .cert-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .cert-card img:hover {
      transform: scale(1.02);
    }

    /* --- GALLERY IMAGE STYLING (Matched size) --- */
    .cert-img-wrapper {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px; /* Gives it a nice card-like padding */
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cert-img-wrapper:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
    }

    .cert-img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
    }

    /* --- RESPONSIVE DESIGN --- */
    @media (max-width: 900px) {
      .grid, .gallery-grid {
        grid-template-columns: repeat(2, 1fr); /* 2 columns on tablets */
      }
    }

    @media (max-width: 600px) {
      .grid, .gallery-grid {
        grid-template-columns: 1fr; /* 1 column on mobile */
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
    
    <h1 class="page-title">All Certifications</h1>
    
    <div class="grid">
      
      <div class="cert-card">
        <h3>Generative AI Foundations</h3>
        <img src="Image/cert-genai.jpg" alt="Generative AI Foundations" loading="lazy">
      </div>

      <div class="cert-card">
        <h3>TCS iON Masterclasses</h3>
        <img src="Image/cert-tcs.jpg" alt="TCS iON Masterclasses" loading="lazy">
      </div>

      <div class="cert-card">
        <h3>Power BI Specialization</h3>
        <img src="Image/cert-powerbi.jpg" alt="Power BI Specialization" loading="lazy">
      </div>

      <div class="cert-card">
        <h3>Wadhwani Skilling</h3>
        <img src="Image/cert-wadhwani.jpg" alt="Wadhwani Skilling" loading="lazy">
      </div>

      <div class="cert-card">
        <h3>Google Cloud Computing Basics</h3>
        <img src="Image/cert-gcp.jpg" alt="Google Cloud Computing Basics" loading="lazy">
      </div>

      <div class="cert-card">
        <h3>Python Data Structures</h3>
        <img src="Image/cert-python.jpg" alt="Python Data Structures" loading="lazy">
      </div>
      
    </div> <h2 class="section-heading">Certificate Gallery</h2>
    
    <div class="gallery-grid">
      
      <div class="cert-img-wrapper">
        <img src="Image/cert1.jpg" alt="Certificate 1" class="cert-img" loading="lazy">
      </div>

      <div class="cert-img-wrapper">
        <img src="Image/cert2.jpg" alt="Certificate 2" class="cert-img" loading="lazy">
      </div>

      <div class="cert-img-wrapper">
        <img src="Image/cert3.jpg" alt="Certificate 3" class="cert-img" loading="lazy">
      </div>

      </div>

  </div>

  <script src="favicon.js"></script>
  
</body>
</html>
