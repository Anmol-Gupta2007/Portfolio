<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmol Gupta | Certifications</title>
    
    <link rel="icon" type="image/png" href="Image/photo.png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1f2937;
            --text: #e5e7eb;
            --border: #374151;
            --gold: #fbbf24; 
            --accent: #38bdf8;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg,#020617,#0f172a);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            width: min(1200px, 100%);
            margin: auto;
        }

        /* --- BACK BUTTON --- */
        .back-btn {
            display: inline-block;
            margin-bottom: 25px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            transition: 0.3s ease;
        }
        
        .back-btn:hover { 
            color: white; 
        }
        
        /* --- HEADINGS --- */
        .page-title { 
            font-size: 2.5rem; 
            margin-bottom: 20px; 
            color: white;
        }

        .section-title { 
            font-size: 1.8rem; 
            margin: 40px 0 20px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; 
            color: var(--accent); /* Blue text for sections */
        }

        /* --- GRID LAYOUT --- */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        /* --- CARD STYLING --- */
        .cert-card {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .cert-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--gold); 
        }

        .cert-card h3 { 
            color: var(--gold); 
            margin-top: 15px; 
            margin-bottom: 15px; 
            font-size: 1.15rem;
        }

        /* --- IMAGE STYLING --- */
        .cert-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .cert-card img:hover {
            transform: scale(1.02);
        }

        /* --- BADGE STYLING --- */
        .badge {
            background: rgba(251, 191, 36, 0.15);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            align-self: flex-start; /* Keeps it tight to the text */
            border: 1px solid rgba(251, 191, 36, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
    
    <h1 class="page-title">Certifications</h1>

    <div id="featured-container" style="display: none;">
        <h2 class="section-title">⭐ Featured Certifications</h2>
        <div class="cert-grid" id="featured-grid"></div>
    </div>

    <h2 class="section-title">All Certifications</h2>
    <div class="cert-grid" id="all-grid"></div>

</div>

<script>
    // ==========================================
    // 🛠️ CERTIFICATE MANAGEMENT AREA
    // To feature a certificate, just change isFeatured to true!
    // ==========================================
    const certData = [
        {
            title: 'Generative AI Foundations',
            imgSrc: 'Image/cert-genai.jpg',
            isFeatured: true 
        },
        {
            title: 'TCS iON Masterclasses',
            imgSrc: 'Image/cert-tcs.jpg',
            isFeatured: true
        },
        {
            title: 'Power BI Specialization',
            imgSrc: 'Image/cert-powerbi.jpg',
            isFeatured: true
        },
        {
            title: 'Wadhwani Skilling',
            imgSrc: 'Image/cert-wadhwani.jpg',
            isFeatured: false
        },
        {
            title: 'Google Cloud Computing Basics',
            imgSrc: 'Image/cert-gcp.jpg',
            isFeatured: false
        },
        {
            title: 'Python Data Structures',
            imgSrc: 'Image/cert-python.jpg',
            isFeatured: false
        }
        // Add your remaining 50+ certificates here by copy/pasting a block!
    ];

    // ==========================================
    // ⚙️ THE ENGINE 
    // ==========================================
    function createCardHTML(cert) {
        // If isFeatured is true, create the badge. Otherwise, leave it blank.
        const badgeHTML = cert.isFeatured ? `<span class="badge">⭐ Featured</span>` : '';
        
        // Return the Card HTML, notice the <img> tag instead of the <p> tag!
        return `
            <div class="cert-card">
                ${badgeHTML}
                <h3>${cert.title}</h3>
                <img src="${cert.imgSrc}" alt="${cert.title}" loading="lazy">
            </div>
        `;
    }

    function renderCertifications() {
        const allGrid = document.getElementById('all-grid');
        const featuredGrid = document.getElementById('featured-grid');
        const featuredContainer = document.getElementById('featured-container');

        let featuredCount = 0;

        certData.forEach(cert => {
            // Add to "All Certifications" grid
            allGrid.innerHTML += createCardHTML(cert);

            // If featured, ALSO add to "Featured Certifications" grid
            if (cert.isFeatured) {
                featuredGrid.innerHTML += createCardHTML(cert);
                featuredCount++;
            }
        });

        // Hide the Featured section completely if 0 certificates are featured
        if (featuredCount > 0) {
            featuredContainer.style.display = 'block';
        }
    }

    // Run the engine when the page loads
    document.addEventListener('DOMContentLoaded', renderCertifications);

</script>
<script src="favicon.js"></script>
</body>
</html>
