<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmol Gupta | Certifications</title>
  
  <link rel="icon" type="image/png" href="Image/photo.png">
  <meta name="theme-color" content="#0f172a">
  
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --border: #1f2937;
      --gold: #fbbf24; /* Golden yellow for the titles */
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 40px 0;
    }

    .page-title {
      font-size: 2.2rem;
      margin-bottom: 30px;
      color: #ffffff;
      font-weight: 700;
    }

    /* --- 3-COLUMN GRID LAYOUT --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
    }

    /* --- CARD STYLING --- */
    .cert-card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 15px; /* Spaces out the title and the image */
    }
    
    .cert-card:hover {
      border-color: var(--accent);
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.1);
    }

    .cert-card h3 {
      color: var(--gold);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.4;
    }

    /* --- IMAGE STYLING INSIDE THE CARD --- */
    .cert-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .cert-card img:hover {
      transform: scale(1.02);
    }

    /* --- RESPONSIVE DESIGN --- */
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr); /* 2 columns on tablets */
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr; /* 1 column on mobile */
      }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <h1 class="page-title">All Certifications</h1>
    
    <div class="grid">
      
      <!-- FEATURED CERTIFICATE 1 -->
      <div class="cert-card">
        <h3>Generative AI Foundations</h3>
        <img src="Image/cert-genai.jpg" alt="Generative AI Foundations" loading="lazy">
      </div>

      <!-- FEATURED CERTIFICATE 2 -->
      <div class="cert-card">
        <h3>TCS iON Masterclasses</h3>
        <img src="Image/cert-tcs.jpg" alt="TCS iON Masterclasses" loading="lazy">
      </div>

      <!-- FEATURED CERTIFICATE 3 -->
      <div class="cert-card">
        <h3>Power BI Specialization</h3>
        <img src="Image/cert-powerbi.jpg" alt="Power BI Specialization" loading="lazy">
      </div>

      <!-- FEATURED CERTIFICATE 4 -->
      <div class="cert-card">
        <h3>Wadhwani Skilling</h3>
        <img src="Image/cert-wadhwani.jpg" alt="Wadhwani Skilling" loading="lazy">
      </div>

      <!-- FEATURED CERTIFICATE 5 -->
      <div class="cert-card">
        <h3>Google Cloud Computing Basics</h3>
        <img src="Image/cert-gcp.jpg" alt="Google Cloud Computing Basics" loading="lazy">
      </div>

      <!-- FEATURED CERTIFICATE 6 -->
      <div class="cert-card">
        <h3>Python Data Structures</h3>
        <img src="Image/cert-python.jpg" alt="Python Data Structures" loading="lazy">
      </div>

    
    <h2 class="section-heading">Certificate Gallery</h2>
    
    <!-- Gallery Grid for your 50+ Images -->
    <div class="gallery-grid">
      
      <!-- Example Image 1 -->
      <div class="cert-img-wrapper">
        <!-- 'loading="lazy"' is crucial here so the page doesn't crash when loading 50 images -->
        <img src="Image/cert1.jpg" alt="Certificate 1" class="cert-img" loading="lazy">
      </div>

      <!-- Example Image 2 -->
      <div class="cert-img-wrapper">
        <img src="Image/cert2.jpg" alt="Certificate 2" class="cert-img" loading="lazy">
      </div>

      <!-- Example Image 3 -->
      <div class="cert-img-wrapper">
        <img src="Image/cert3.jpg" alt="Certificate 3" class="cert-img" loading="lazy">
      </div>

      <!-- COPY AND PASTE THIS BLOCK FOR YOUR REMAINING 47+ CERTIFICATES -->

        <img src="Image/YOUR-IMAGE-NAME.jpg" alt="Certificate" class="cert-img" loading="lazy">
      </div> 
      -->

    </div>

  </div>

</body>
</html>
