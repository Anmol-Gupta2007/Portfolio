<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmol Gupta | All Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg,#020617,#0f172a);
            color: #e5e7eb;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            width: min(1200px, 100%);
            margin: auto;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 25px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
        }
        .back-btn:hover { color: white; }
        
        .page-title { font-size: 2.5rem; margin-bottom: 20px; }
        .section-title { font-size: 1.8rem; margin: 40px 0 20px; border-bottom: 1px solid #374151; padding-bottom: 10px; color: #38bdf8; }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        .project-card {
            background: #1f2937;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #374151;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover { transform: translateY(-5px); border-color:#fbbf24; }
        .project-card h3 { color: #fbbf24; margin-top: 10px; margin-bottom: 10px; }
        .project-card p { line-height: 1.6; color: #d1d5db; flex-grow: 1; margin-bottom: 0;}
        
        /* --- Badge Styling --- */
        .badge {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            align-self: flex-start;
            border: 1px solid #fbbf24;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Portfolio</a>
    
    <h1 class="page-title">Projects</h1>

    <!-- Dynamic Featured Projects Section -->
    <div id="featured-container" style="display: none;">
        <h2 class="section-title">⭐ Featured Projects</h2>
        <div class="projects-grid" id="featured-grid"></div>
    </div>

    <!-- Dynamic All Projects Section -->
    <h2 class="section-title">All Projects</h2>
    <div class="projects-grid" id="all-grid"></div>

</div>

<script>
    // ==========================================
    // 🛠️ PROJECT MANAGEMENT AREA
    // To feature a project, just change isFeatured to true!
    // ==========================================
    const projectsData = [
        {
            title: 'Personal Portfolio PWA',
            desc: 'A fully responsive Progressive Web App built with HTML, CSS, and JS, featuring dynamic components and automated network-first cache updates.',
            isFeatured: true 
        },
        {
            title: 'Cafeteria Management System',
            desc: 'A management system project that optimizes daily cafeteria operations through efficient and structured programming.',
            isFeatured: false
        },
        {
            title: 'TiltGuard - Anti-Theft Tilt Detection System',
            desc: 'Developed a smart vehicle security prototype that detects unauthorized tilting or movement using a tilt sensor and immediately triggers an alert.',
            isFeatured: true
        },
        {
            title: 'Automatic Sensor-Based Dustbin',
            desc: 'An embedded project idea focused on automation using sensors to detect and open a dustbin without manual contact.',
            isFeatured: false
        },
        {
            title: 'Student Management System',
            desc: 'Centralized Student Data Management, Efficient Record Handling, Automation of Administrative Tasks, Data Accuracy and Consistency, User-Friendly Interface, Secure Data Storage.',
            isFeatured: false
        },
        {
            title: 'Generative AI Explorations',
            desc: 'Collaborative development from events like Graph-E-Thon 3.0 and ET AI Hackathon 2.0, focusing on rapid prototyping and innovative problem-solving.',
            isFeatured: true
        }
    ];

    // ==========================================
    // ⚙️ THE ENGINE (You don't need to touch this part)
    // ==========================================
    function createCardHTML(project) {
        const badgeHTML = project.isFeatured ? `<span class="badge">⭐ Featured</span>` : '';
        return `
            <div class="project-card">
                ${badgeHTML}
                <h3>${project.title}</h3>
                <p>${project.desc}</p>
            </div>
        `;
    }

    function renderProjects() {
        const allGrid = document.getElementById('all-grid');
        const featuredGrid = document.getElementById('featured-grid');
        const featuredContainer = document.getElementById('featured-container');

        let featuredCount = 0;

        projectsData.forEach(project => {
            // Add to "All Projects" grid
            allGrid.innerHTML += createCardHTML(project);

            // If featured, also add to "Featured Projects" grid
            if (project.isFeatured) {
                featuredGrid.innerHTML += createCardHTML(project);
                featuredCount++;
            }
        });

        // Hide the Featured section completely if 0 projects are featured
        if (featuredCount > 0) {
            featuredContainer.style.display = 'block';
        }
    }

    // Run the engine when the page loads
    document.addEventListener('DOMContentLoaded', renderProjects);

</script>
<script src="favicon.js"></script>
</body>
</html>
